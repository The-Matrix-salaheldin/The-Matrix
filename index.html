  // 5. Replay all scripts in document order, preserving src vs inline
  var allScripts=Array.prototype.slice.call(doc.querySelectorAll('script'));
  function runNext(i){

    var orig=allScripts[i];
    var s=document.createElement('script');
    if(orig.src){

      s.async=false;
      s.onload=function(){runNext(i+1);};
      s.onerror=function(){runNext(i+1);};

      document.head.appendChild(s);
